<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Computer Academy</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#e8ffe8;}
.topbar{background:black;color:white;padding:8px 20px;display:flex;justify-content:space-between;}
header{background:white;padding:15px;font-size:22px;font-weight:bold;}
.section{padding:30px;text-align:center;}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.card{background:white;padding:20px;border-radius:12px;width:260px;box-shadow:0 5px 15px rgba(0,0,0,0.1);transition:0.3s;}
.card:hover{transform:translateY(-8px);}
.row{display:flex;justify-content:space-between;margin:10px 0;}
.btn-dark{background:#111;color:white;padding:12px;width:100%;border:none;border-radius:8px;}
.hero{text-align:center;padding:50px;background:linear-gradient(to right,#d4ffd4,#cceeff);}
</style>
</head>

<body>

<div class="topbar">
<span>+91 9305066046</span>
<span>info@adityacomputer.com</span>
</div>

<header><i class="fa fa-graduation-cap"></i> Aditya Computer Academy</header>

<div class="hero">
<h1>Welcome to Aditya Computer Academy</h1>
<p>Empowering students with quality computer education</p>
<a href="form.html"><button class="btn-dark">Apply Now</button></a>
</div>

<div class="section">
<h2>Popular Courses</h2>

<div class="grid">

<div class="card">
<h3>ADCA</h3>
<div class="row"><span>12 Months</span><span>₹6000</span></div>
<a href="adca.html"><button class="btn-dark">View Details</button></a>
</div>

<div class="card">
<h3>DCA</h3>
<div class="row"><span>6 Months</span><span>₹4000</span></div>
<a href="dca.html"><button class="btn-dark">View Details</button></a>
</div>

<div class="card">
<h3>CCC</h3>
<div class="row"><span>3 Months</span><span>₹3000</span></div>
<a href="ccc.html"><button class="btn-dark">View Details</button></a>
</div>

<div class="card">
<h3>Tally</h3>
<div class="row"><span>2 Months</span><span>₹3000</span></div>
<a href="tally.html"><button class="btn-dark">View Details</button></a>
</div>

</div>
</div>

</body>
</html>
